name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy AlertOps
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Syntax check
        run: node --check backend/src/server.ts 2>/dev/null || true

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /root/alertops

            # Pull latest code
            git pull origin main

            # Rebuild and restart services (zero-downtime: backend stays up until new one healthy)
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            # Wait for backend health
            echo "Waiting for backend to be healthy..."
            for i in $(seq 1 24); do
              if curl -sf http://localhost:4100/health > /dev/null; then
                echo "Backend healthy after $((i * 5))s"
                break
              fi
              if [ $i -eq 24 ]; then
                echo "Backend did not become healthy in 120s"
                docker compose -f docker-compose.prod.yml logs alertops-backend --tail=50
                exit 1
              fi
              sleep 5
            done

            echo "Deployment complete"
            docker compose -f docker-compose.prod.yml ps
