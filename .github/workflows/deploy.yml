name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  test:
    name: Unit & service tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test

  test-web:
    name: Web store tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy AlertOps
    needs: [test, test-web]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: .env

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /root/alertops

            # Pull latest code
            git pull origin main

            # Rebuild and restart services (zero-downtime: backend stays up until new one healthy)
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            # Wait for backend health
            echo "Waiting for backend to be healthy..."
            for i in $(seq 1 24); do
              if curl -sf http://localhost:4100/health > /dev/null; then
                echo "Backend healthy after $((i * 5))s"
                break
              fi
              if [ $i -eq 24 ]; then
                echo "Backend did not become healthy in 120s"
                docker compose -f docker-compose.prod.yml logs alertops-backend --tail=50
                exit 1
              fi
              sleep 5
            done

            echo "Deployment complete"
            docker compose -f docker-compose.prod.yml ps
