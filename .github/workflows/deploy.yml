name: Deploy to Hetzner

on:
  push:
    branches: [main]

# Never let two deploys of main race each other on the box.
concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  BACKEND_IMAGE: ghcr.io/ashu131998/alertops-backend
  WEB_IMAGE: ghcr.io/ashu131998/alertops-web

jobs:
  test:
    name: Unit & service tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Pin npm (lockfiles generated with npm 10)
        run: npm install -g npm@10.8.2

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test

  test-web:
    name: Web store tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      # web/package-lock.json is generated with npm 11 (vitest 4 / rolldown
      # tree); pin the same npm so CI resolves it identically to local dev.
      - name: Pin npm
        run: npm install -g npm@11.12.1

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build & push images
    needs: [test, test-web]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
            ${{ env.WEB_IMAGE }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    name: Deploy AlertOps
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: .env

    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script_stop: true
          envs: IMAGE_TAG
          script: |
            set -e
            cd /root/alertops

            # Keep the compose file (and .env.prod-adjacent config) in sync.
            # No source build happens here anymore — only the YAML is needed.
            git pull origin main

            # Pin the release to the exact images CI just built & pushed.
            export IMAGE_TAG="$IMAGE_TAG"

            # Authenticate to GHCR to pull private images.
            echo "${{ secrets.GHCR_PULL_TOKEN }}" \
              | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

            # Pull pre-built images (no --build: no compilation on the VM).
            docker compose -f docker-compose.prod.yml pull

            # Roll out. Backend stays up until the new one is healthy.
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait for backend health.
            echo "Waiting for backend to be healthy..."
            for i in $(seq 1 24); do
              if curl -sf http://localhost:4100/health > /dev/null; then
                echo "Backend healthy after $((i * 5))s"
                break
              fi
              if [ $i -eq 24 ]; then
                echo "Backend did not become healthy in 120s"
                docker compose -f docker-compose.prod.yml logs alertops-backend --tail=50
                exit 1
              fi
              sleep 5
            done

            # Free disk from superseded images.
            docker image prune -f

            echo "Deployment complete (tag $IMAGE_TAG)"
            docker compose -f docker-compose.prod.yml ps
