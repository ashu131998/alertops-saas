version: '3.9'

# Images are built and pushed by CI (.github/workflows/deploy.yml) to GHCR.
# The server only pulls; it never builds. IMAGE_TAG is the git SHA of the
# release, exported by the deploy job (defaults to :latest for manual use).

networks:
  alertops:
    driver: bridge
  esp-iot_default:
    external: true

services:
  alertops-backend:
    image: ghcr.io/ashu131998/alertops-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:4100:4000"
    env_file: ./backend/.env.prod
    networks:
      - alertops
      - esp-iot_default
    depends_on:
      alertops-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  alertops-migrate:
    image: ghcr.io/ashu131998/alertops-backend:${IMAGE_TAG:-latest}
    # Schema is managed with `db push` (no prisma/migrations history). Applies
    # additive changes (new tables/columns/indexes) idempotently before the
    # backend boots; runs to completion, then the backend starts.
    command: sh -c "npx prisma db push --skip-generate"
    env_file: ./backend/.env.prod
    networks:
      - esp-iot_default
    restart: "no"

  alertops-web:
    image: ghcr.io/ashu131998/alertops-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3000"
    environment:
      NODE_ENV: production
    networks:
      - alertops
