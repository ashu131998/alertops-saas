version: '3.9'

networks:
  alertops:
    driver: bridge
  esp-iot_default:
    external: true

services:
  alertops-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:4100:4000"
    env_file: ./backend/.env.prod
    networks:
      - alertops
      - esp-iot_default
    depends_on:
      alertops-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  alertops-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "npx prisma migrate deploy"
    env_file: ./backend/.env.prod
    networks:
      - esp-iot_default
    restart: "no"

  alertops-web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3000"
    environment:
      NODE_ENV: production
    networks:
      - alertops
